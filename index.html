<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현장 사진대장 생성기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: linear-gradient(135deg,#e8f4fd,#f0f7ee); padding: 20px 14px 40px; font-family: "맑은 고딕","Malgun Gothic",sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { text-align: center; font-size: 24px; color: #1a5276; margin-bottom: 4px; }
  .sub { text-align: center; color: #888; font-size: 12px; margin-bottom: 20px; }
  .card { background: #fff; border-radius: 16px; padding: 22px 20px; box-shadow: 0 4px 20px rgba(0,0,0,.08); margin-bottom: 16px; }
  .card label.section { font-weight: 600; font-size: 14px; color: #333; display: block; margin-bottom: 8px; }
  input[type=text] { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1.5px solid #d0d7de; font-size: 14px; outline: none; font-family: inherit; }
  .layout-btns { display: flex; gap: 8px; }
  .layout-btns button { flex: 1; padding: 12px 0; border-radius: 10px; border: 1.5px solid #d0d7de; background: #fafafa; color: #666; font-size: 15px; cursor: pointer; font-family: inherit; }
  .layout-btns button.active { border: 2px solid #1a5276; background: #eaf3fb; color: #1a5276; font-weight: 700; }
  .drop-zone { border: 2px dashed #90caf9; background: #f0f7ff; border-radius: 12px; padding: 18px 12px; text-align: center; color: #1a5276; font-size: 14px; margin-bottom: 10px; transition: all .15s; }
  .drop-zone.over { border-color: #1a5276; background: #dbeeff; }
  .add-btns { display: flex; gap: 10px; }
  .add-btns label { flex: 1; padding: 14px 8px; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; text-align: center; display: block; }
  .btn-gallery { border: 2px dashed #90caf9; background: #f0f7ff; color: #1a5276; }
  .btn-camera  { border: 2px dashed #81c784; background: #f0fff4; color: #1b5e20; }
  .photo-list { display: flex; flex-direction: column; gap: 10px; }
  .photo-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f8fbff; border-radius: 10px; border: 1px solid #dde8f5; }
  .photo-item img { width: 64px; height: 52px; object-fit: cover; border-radius: 6px; flex-shrink: 0; border: 1px solid #ccc; }
  .photo-item input { flex: 1; padding: 9px 11px; border-radius: 6px; border: 1.5px solid #d0d7de; font-size: 14px; outline: none; font-family: inherit; }
  .move-btns { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .move-btns button { width: 30px; height: 28px; font-size: 12px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #fff; }
  .move-btns button:disabled { opacity: 0.3; cursor: default; }
  .del-btn { width: 34px; height: 34px; border-radius: 8px; border: none; background: #fdecea; color: #c0392b; cursor: pointer; font-size: 16px; flex-shrink: 0; }
  .dl-btn { width: 100%; padding: 16px; border-radius: 14px; background: #1a5276; color: #fff; font-weight: 700; font-size: 17px; border: none; cursor: pointer; box-shadow: 0 4px 14px rgba(26,82,118,.35); font-family: inherit; }
  .dl-btn:disabled { background: #bbb; box-shadow: none; cursor: not-allowed; }
  .hint { margin-top: 12px; text-align: center; color: #aaa; font-size: 12px; line-height: 1.9; }
  .count-label { font-weight: 600; font-size: 14px; color: #333; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📷 현장 사진대장</h1>
  <p class="sub">HY견고딕 22pt 제목 · 휴먼명조 15pt 캡션</p>

  <!-- 제목 -->
  <div class="card">
    <label class="section">📌 대장 제목</label>
    <input type="text" id="docTitle" placeholder="예) 2025 현장점검 사진대장">
  </div>

  <!-- 레이아웃 -->
  <div class="card">
    <label class="section">📐 A4 레이아웃 (페이지당 사진 수)</label>
    <div class="layout-btns">
      <button onclick="setLayout(2)" id="btn2" class="active">2컷</button>
      <button onclick="setLayout(4)" id="btn4">4컷</button>
      <button onclick="setLayout(6)" id="btn6">6컷</button>
    </div>
  </div>

  <!-- 사진 추가 -->
  <div class="card">
    <label class="section">🖼 사진 추가</label>
    <div class="drop-zone" id="dropZone">📂 여기에 사진을 드래그 &amp; 드롭 (PC)</div>
    <div class="add-btns">
      <label class="btn-gallery">
        🗂 갤러리
        <input type="file" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
      </label>
      <label class="btn-camera">
        📸 카메라
        <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handleFiles(this.files)">
      </label>
    </div>
  </div>

  <!-- 사진 목록 -->
  <div class="card" id="listCard" style="display:none">
    <div class="count-label" id="countLabel">🗂 사진 목록 — 0장</div>
    <div class="photo-list" id="photoList"></div>
  </div>

  <!-- 다운로드 -->
  <button class="dl-btn" id="dlBtn" onclick="generate()" disabled>⬇️ 사진대장 다운로드</button>
  <p class="hint">다운로드 후 브라우저에서 열기 → <strong>Ctrl+P</strong> 인쇄·PDF 저장<br>HY견고딕·휴먼명조는 한글 설치 PC에서 정확히 표시됩니다</p>
</div>

<script>
let layout = 2;
let photos = []; // [{dataUrl, caption}]

function setLayout(n) {
  layout = n;
  [2,4,6].forEach(v => document.getElementById('btn'+v).classList.toggle('active', v===n));
}

// 드래그 앤 드롭
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handleFiles(e.dataTransfer.files); });

async function handleFiles(files) {
  if (!files || !files.length) return;
  for (const f of Array.from(files)) {
    const dataUrl = await fileToDataUrl(f);
    photos.push({ dataUrl, caption: '' });
  }
  renderList();
}

function fileToDataUrl(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}

function renderList() {
  const list = document.getElementById('photoList');
  const card = document.getElementById('listCard');
  const dlBtn = document.getElementById('dlBtn');
  document.getElementById('countLabel').textContent = `🗂 사진 목록 — ${photos.length}장`;
  card.style.display = photos.length ? '' : 'none';
  dlBtn.disabled = !photos.length;

  list.innerHTML = '';
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-item';
    div.innerHTML = `
      <img src="${p.dataUrl}">
      <input type="text" placeholder="캡션 입력" value="${escHtml(p.caption)}" oninput="photos[${i}].caption=this.value">
      <div class="move-btns">
        <button onclick="move(${i},-1)" ${i===0?'disabled':''}>▲</button>
        <button onclick="move(${i},1)" ${i===photos.length-1?'disabled':''}>▼</button>
      </div>
      <button class="del-btn" onclick="del(${i})">✕</button>`;
    list.appendChild(div);
  });
}

function move(i, d) {
  const j = i + d;
  if (j < 0 || j >= photos.length) return;
  [photos[i], photos[j]] = [photos[j], photos[i]];
  renderList();
}
function del(i) { photos.splice(i, 1); renderList(); }

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resizeImage(dataUrl, maxW, maxH) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxW/img.width, maxH/img.height, 1);
      const w = Math.round(img.width*ratio), h = Math.round(img.height*ratio);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

async function generate() {
  if (!photos.length) return;
  const btn = document.getElementById('dlBtn');
  btn.disabled = true; btn.textContent = '⏳ 생성 중...';

  try {
    const title = document.getElementById('docTitle').value || '현장 사진대장';
    const cols = layout===2?1:layout===4?2:3;
    const maxW = layout===2?720:layout===4?480:340;
    const maxH = layout===2?500:layout===4?340:240;
    const imgH = layout===2?'200px':layout===4?'170px':'130px';

    const resized = await Promise.all(photos.map(async p => ({
      ...p, dataUrl: await resizeImage(p.dataUrl, maxW, maxH)
    })));

    const pages = [];
    for (let i=0; i<resized.length; i+=layout) pages.push(resized.slice(i,i+layout));

    const pageHtml = pages.map((page,pi) => {
      const cells = page.map(p => `
        <div class="cell">
          <div class="img-wrap"><img src="${p.dataUrl}"></div>
          <div class="caption">${p.caption ? escHtml(p.caption) : '&nbsp;'}</div>
        </div>`).join('');
      const num = pages.length>1 ? ` (${pi+1}/${pages.length})` : '';
      return `<div class="page"><div class="pt">${escHtml(title)}${num}</div><div class="grid c${cols}">${cells}</div></div>`;
    }).join('');

    const html = `<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>${escHtml(title)}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#ddd;font-family:"맑은 고딕",sans-serif}
.page{width:210mm;min-height:297mm;background:#fff;margin:10mm auto;padding:20mm 18mm 15mm;page-break-after:always;box-shadow:0 2px 10px rgba(0,0,0,.2);display:flex;flex-direction:column}
.pt{font-family:"HY견고딕","HYGothic-Extra","맑은 고딕",sans-serif;font-size:22pt;font-weight:normal;text-align:center;padding-bottom:6mm;border-bottom:2.5px solid #222;margin-bottom:8mm}
.grid{display:grid;gap:5mm;flex:1;align-content:start}
.c1{grid-template-columns:1fr}.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}
.cell{border:1px solid #aaa;display:flex;flex-direction:column}
.img-wrap{flex:1;min-height:${imgH};background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.img-wrap img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.caption{font-family:"휴먼명조","HY신명조","바탕",serif;font-size:15pt;text-align:center;padding:3mm 4mm;border-top:1px solid #bbb;background:#fafafa;word-break:keep-all;line-height:1.5;min-height:11mm}
@media print{body{background:none}.page{margin:0;box-shadow:none;padding:15mm}}
</style></head><body>${pageHtml}</body></html>`;

    // Blob → 다운로드
    const blob = new Blob([html], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${title}.html`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 1000);
  } finally {
    btn.disabled = false;
    btn.textContent = '⬇️ 사진대장 다운로드';
  }
}
</script>
</body>
</html>
